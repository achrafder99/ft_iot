apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-app
  namespace: app
  labels:
    app: nest-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nest-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: nest-app
    spec:
      imagePullSecrets:
        - name: dockerhub-creds
      containers:
        - name: nest-app
          image: PLACEHOLDER_IMAGE
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: nest-app-env
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3