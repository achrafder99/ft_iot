name: CI/CD Pipeline

on:
    push:
        branches:
            - main

env:
    IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}
    NODE_VERSION: latest

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
    run-test:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: oven-sh/setup-bun@v2

          with:
            bun-version: ${{ env.NODE_VERSION}}

        - name: Install dependenices
          run: bun install

        - name: Run unit tests
          run: | 
                bun run test

        - name: Run lint
          run: |
           bun run lint

        - name: Check typecheck
          run: |
              bun run typecheck

        - name: Check build
          run: |
           bun run build

    build-and-push:
        name: Build, Scan & Push Image
        runs-on: ubuntu-latest
        needs: run-test
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        outputs:
          image_tag: ${{ steps.vars.outputs.short_sha}}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Login To DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME}}
                password: ${{ secrets.DOCKERHUB_TOKEN}}

            - name: Check the login
              run: docker info

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Set short SHA
              id: vars
              run: | 
                echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v7

              with:
                context: .
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USERNAME }}/nest-app:latest
                    ${{ secrets.DOCKERHUB_USERNAME }}/nest-app:${{ steps.vars.outputs.sha_short }}

            - name: Scan image for vulnerabilities
              uses: crazy-max/ghaction-container-scan@v4
              with:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/nest-app:latest

    deploy:
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        runs-on: ubuntu-latest
        needs: build-and-push
        env:
            VM_HOST: ${{ secrets.AZURE_VM_HOST }}
        environment:
          name: production
          url: http://${{ env.VM_HOST }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup SSH
              run: |
                mkdir -p ~/.ssh
                printf '%s\n' "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/deploy_key
                chmod 600 ~/.ssh/deploy_key
                ssh-keyscan -p "${{ secrets.AZURE_VM_SSH_PORT }}" -H "${{ secrets.AZURE_VM_HOST }}" >> ~/.ssh/known_hosts

            - name: Debug key bytes
              run: |
               wc -c ~/.ssh/deploy_key
               sha256sum ~/.ssh/deploy_key
               head -1 ~/.ssh/deploy_key
               tail -1 ~/.ssh/deploy_key
            
            - name: Copy deploy script to server
              run: |
                scp -P "${{ secrets.AZURE_VM_SSH_PORT }}" -i ~/.ssh/deploy_key \
                  scripts/deploy.sh \
                  "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:/opt/app/deploy.sh"

            - name: Run deploy script on server
              env:
                 IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
              run: | 
                ssh -p "${{ secrets.AZURE_VM_SSH_PORT }}" -i ~/.ssh/deploy_key \ 
                "${{ secrets.AZURE_VM_USER}}@${{secrets.AZURE_VM_HOST}}" \ 
                "chmod +x /opt/app/deploy.sh && \
                IMAGE_NAME='${{ env.IMAGE_NAME }}' \
                IMAGE_TAG='${{ env.IMAGE_TAG }}' \
                CONTAINER_NAME='app' \
                APP_PORT='${{ secrets.APP_PORT }}' \
                HEALTH_PATH='${{ secrets.HEALTH_PATH }}' \
                DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' \
                DOCKERHUB_TOKEN='${{ secrets.DOCKERHUB_TOKEN }}' \
                /opt/app/deploy.sh"

            - name: Clean up SSH key && Notify on slack
              if: success()
              uses: slackapi/slack-github-action@v4.0.0
              with:
                webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
                webhook-type: incoming-webhook
                payload: |
                  "text": "GitHub Action Workflow Alert: The build has completed successfully!"
                     
