name: "Deploy to Production"

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Login To DockerHub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME}}
                password: ${{ secrets.DOCKER_PASSWORD}}
            - name: Check the login
              run: docker info



        