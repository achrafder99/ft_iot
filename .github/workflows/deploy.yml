name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}
  NODE_VERSION: latest

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  run-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun (Node environment)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.NODE_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: | 
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os}}-bun-${{ hashFiles('bun.lockfile') }}
          restore-keys: |
            ${{ runner.os }}-bun-
            
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: |
          bun run test

      - name: Run lint
        run: |
          bun run lint

      - name: Check typecheck
        run: |
          bun run typecheck

      - name: Check build
        run: |
          bun run build

      - name: Test Coverage
        id: test-coverage
        run: |
          bun run test:cov
          COVERAGE=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
          echo "coverage=${COVERAGE}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "Test coverage: ${{ steps.test-coverage.outputs.coverage }}%"
            }

  build-and-push:
    name: Build, Scan & Push Image
    runs-on: ubuntu-latest
    needs: run-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login To DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check the login
        run: docker info

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set short SHA
        id: vars
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nest-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nest-app:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities
        uses: crazy-max/ghaction-container-scan@v4
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/nest-app:latest

  deploy:
    name: Deploy to Kubernetes (k3s)
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      VM_HOST: ${{ secrets.AZURE_VM_HOST }}
    environment:
      name: production
      url: http://${{ env.VM_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Validate k8s manifests (kubeconform)
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -summary k8s/*.yaml

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.AZURE_VM_SSH_PORT }}" -H "${{ secrets.AZURE_VM_HOST }}" >> ~/.ssh/known_hosts
      
      - name: Copy k8s manifests to server
        run: |
          scp -P "${{ secrets.AZURE_VM_SSH_PORT }}" -i ~/.ssh/deploy_key -r \
            k8s \
            "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:/opt/app/k8s"

      - name: Copy deploy script to server
        run: |
          scp -P "${{ secrets.AZURE_VM_SSH_PORT }}" -i ~/.ssh/deploy_key \
            scripts/k8s-deploy.sh \
            "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:/opt/app/k8s-deploy.sh"

      - name: Apply k8s manifests
        run: |
          ssh -p "${{ secrets.AZURE_VM_SSH_PORT }}" -i ~/.ssh/deploy_key \
            "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}" \
            "echo 'whoami:' \$(whoami) && \
             echo 'KUBECONFIG before export:' \$KUBECONFIG && \
             export KUBECONFIG=/home/deploy/.kube/config && \
             echo 'KUBECONFIG after export:' \$KUBECONFIG && \
             kubectl apply -f /opt/app/k8s/namespace.yml && \
             kubectl get deployment nest-app -n app >/dev/null 2>&1 || kubectl apply -f /opt/app/k8s/deployment.yml && \
             kubectl apply -f /opt/app/k8s/service.yml && \
             kubectl apply -f /opt/app/k8s/ingress.yml && \
             kubectl apply -f /opt/app/k8s/hpa.yml"

      - name: Run deployment
        run: |
          ssh -p "${{ secrets.AZURE_VM_SSH_PORT }}" -i ~/.ssh/deploy_key \
            "${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}" \
            "chmod +x /opt/app/k8s-deploy.sh && \
             IMAGE_NAME='${{ env.IMAGE_NAME }}' \
             IMAGE_TAG='${{ needs.build-and-push.outputs.image_tag }}' \
             NAMESPACE='app' \
             DEPLOYMENT='nest-app' \
             CONTAINER='nest-app' \
             /opt/app/k8s-deploy.sh"

      - name: Clean up SSH key && Notify on slack
        if: success()
        uses: slackapi/slack-github-action@v4.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "GitHub Action Workflow Alert: The build has completed successfully!"
            }
                     
